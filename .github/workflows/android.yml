name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ant \
            autoconf \
            automake \
            ccache \
            cmake \
            g++ \
            gcc \
            gettext \
            git \
            lbzip2 \
            libffi-dev \
            libltdl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            libtool \
            libtool-bin \
            libtinfo6 \
            m4 \
            make \
            openjdk-17-jdk \
            patch \
            pkg-config \
            python3-dev \
            python3-pip \
            python3-venv \
            unzip \
            wget \
            zip \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install setuptools cython==0.29.34 buildozer

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          if-no-files-found: error
